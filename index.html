<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMood Pro | Kedi Dili Rehberi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="floating-cat">🐱🎾</div>

    <nav>
        <div class="logo">🐾 CatMood <span style="font-size: 12px; vertical-align: middle;">PRO</span></div>
        <div class="ad-placeholder">Google Ads Area</div>
    </nav>

    <header>
        <h1>Kediniz Ne Anlatıyor?</h1>
        <p>Patili dostunuzun gizli dünyasını keşfedin.</p>
    </header>

    <main class="container">
        <div class="card" onclick="playSound('angry')">
            <div class="badge red">SİNİRLİ</div>
            <img src="https://images.unsplash.com/photo-1513245543132-31f507417b26?w=400" alt="Sinirli">
            <div class="info">
                <h3>Savunma Modu</h3>
                <button class="btn-play">Sesi Dinle</button>
            </div>
            <audio id="angry" src="https://www.myinstants.com/media/sounds/hissing-cat.mp3"></audio>
        </div>

        <div class="card" onclick="playSound('happy')">
            <div class="badge green">MUTLU</div>
            <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400" alt="Mutlu">
            <div class="info">
                <h3>Huzurlu Mırıltı</h3>
                <button class="btn-play">Sesi Dinle</button>
            </div>
            <audio id="happy" src="https://www.myinstants.com/media/sounds/cat-purring.mp3"></audio>
        </div>

        <div class="card" onclick="playSound('hungry')">
            <div class="badge orange">AÇIKMIŞ</div>
            <img src="https://images.unsplash.com/photo-1573865526739-10659fef78a5?w=400" alt="Aç">
            <div class="info">
                <h3>Yemek İstiyorum</h3>
                <button class="btn-play">Sesi Dinle</button>
            </div>
            <audio id="hungry" src="https://www.myinstants.com/media/sounds/classic_meow.mp3"></audio>
        </div>

        <div class="card" onclick="playSound('playful')">
            <div class="badge blue">OYUNBAZ</div>
            <img src="https://images.unsplash.com/photo-1511497584788-876760111969?w=400" alt="Oyun">
            <div class="info">
                <h3>Avlanma Modu</h3>
                <button class="btn-play">Sesi Dinle</button>
            </div>
            <audio id="playful" src="https://www.myinstants.com/media/sounds/cat-meow-8246.mp3"></audio>
        </div>

        <div class="card" onclick="playSound('tired')">
            <div class="badge purple">YORGUN</div>
            <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=400" alt="Yorgun">
            <div class="info">
                <h3>Uykum Var</h3>
                <button class="btn-play">Sesi Dinle</button>
            </div>
            <audio id="tired" src="https://www.myinstants.com/media/sounds/cat-yawn.mp3"></audio>
        </div>
    </main>

    <div class="donation-section">
        <a href="#" class="donate-btn">☕ Kedilere Mama Bağışla</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
